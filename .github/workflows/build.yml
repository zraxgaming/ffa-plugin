name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build shaded jar
        run: mvn -B -DskipTests package

      - name: Find shaded jar
        id: jar
        shell: bash
        run: |
          jar_path="$(find target -maxdepth 1 -name '*.jar' ! -name 'original-*.jar' | head -n 1)"
          if [ -z "$jar_path" ]; then
            echo "No shaded jar found."
            exit 1
          fi
          echo "path=$jar_path" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$jar_path")" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: z-ffa-core
          path: ${{ steps.jar.outputs.path }}
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.jar.outputs.path }}
          generate_release_notes: true
