prefix: "<gradient:#21d4fd:#b721ff><bold>Z-FFA</bold></gradient> <dark_gray>|</dark_gray> "

messages:
  permissions.no: "<red>No permission."
  command.player-only: "<red>Player-only command."

  ffa.joined: "<green>Joined FFA arena <white>{arena}</white> with kit <white>{kit}</white>."
  ffa.left: "<yellow>You left FFA."
  ffa.arena-not-ready: "<red>That FFA arena has no FFA spawns or is disabled."
  ffa.kit-not-allowed: "<red>That kit is not allowed in this arena."
  ffa.vip-arena: "<red>This is a VIP arena."
  ffa.event-disabled: "<red>The event queue is not enabled."
  ffa.event-missing-config: "<red>Event arena or kit is not configured. Ask an admin to set them."
  ffa.event-arena-unavailable: "<red>The configured event arena is not available."
  ffa.event-kit-unavailable: "<red>The configured event kit is not available."
  ffa.event-kit-invalid: "<red>The event kit is not valid for the selected arena."
  ffa.hit-request: "<green><gold>{attacker}</gold> wants to fight you. Hit them back to start."
  ffa.hit-request-sent: "<yellow>Fight request sent to <white>{victim}</white>."
  ffa.kill-boost-activated: "<green>Your kill boost activated!</green>"

  duel.request.player-not-found: "<red>Player not found."
  duel.request.kit-not-found: "<red>Kit '{kit}' not found."
  duel.request.kit-unavailable: "<red>The duel kit is unavailable."
  duel.request.no-kits: "<red>No kits are currently available."
  duel.request.already-in-match: "<red>Either you or that player is already in a match."
  duel.request.arena-unavailable: "<red>No arena is available for that duel kit."
  duel.request.sent: "<green>Duel request sent to {target}!"
  duel.request.received: "<yellow>{challenger} has challenged you to a duel."
  duel.request.instructions: "<gray>Type <white>/duel accept</white> or <white>/duel decline</white> within 30 seconds."
  duel.request.no-active: "<red>There is no active duel request to {action}."
  duel.request.not-online: "<red>The challenger is no longer online."
  duel.request.accepted.challenger: "<green>Your duel request was accepted by {target}!"
  duel.request.accepted.target: "<green>You accepted the duel request from {challenger}!"
  duel.request.declined.challenger: "<red>Your duel request was declined by {target}."
  duel.request.declined.target: "<yellow>You declined the duel request."
  duel.start.fight: "<green>Fight!"
  duel.win: "<green>Your team won +{elo} Elo.</green>"
  duel.loss: "<red>Your team lost -{elo} Elo.</red>"
  duel.voucher.used: "<green>Your streak was preserved by a voucher! Remaining: <white>{remaining}</white></green>"
  duel.player-eliminated: "<red>You were eliminated."
  duel.result: "<gray>Result: {reason}</gray>"
  duel.draw: "<yellow>Match ended: {reason}</yellow>"
