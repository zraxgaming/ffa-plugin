# Z-FFA message configuration
# Edit these strings to match your server's tone.
# Placeholders use {name} format, for example {arena}, {kit}, {target}, {challenger}, {elo}.

prefix: "<gradient:#21d4fd:#b721ff><bold>Z-FFA</bold></gradient> <dark_gray>|</dark_gray> "

permissions.no: "<red>No permission."
command.player-only: "<red>Player-only command."

queue.already-in-match: "<red>You are already in a match."
queue.no-arenas: "<red>No arenas are set up for <white>{kit}</white>. Ask an admin to connect a ready arena to this kit."
queue.arenas-busy: "<yellow>All <white>{kit}</white> arenas are currently in use. Try again in a moment."
queue.joined: "<green>Queued for <white>{kit}</white> (<white>{type}</white>)."
queue.party-no-arenas: "<red>No arenas are set up for <white>{kit}</white>."
queue.party-arenas-busy: "<yellow>All <white>{kit}</white> arenas are currently in use. Try again in a moment."
queue.party-members-not-ready: "<red>Every party member must be online and out of matches/FFA."
queue.party-joined: "<green>Your party queued for <white>{kit}</white> (<white>{type}</white>)."
queue.status.ffa: "FFA: {arena}"
queue.status.in-match: "In Match"
queue.status.lobby: "Lobby"
queue.status.queued: "Queued: {kit} ({type})"
queue.left: "<yellow>You left the queue."
queue.not-queued: "<gray>You are not currently queued."

party.created: "<green>Party created."
party.only-leader-invite: "<red>Only the party leader can invite players."
party.already-in-party: "<yellow>That player is already in your party."
party.invited: "<green>Invited <white>{target}</white>."
party.invited-target: "<green>{leader} invited you to a party. Use <white>/party accept</white>."
party.no-invite: "<red>You do not have a party invite."
party.invite-expired: "<red>That party is no longer available."
party.full: "<red>That party is full. Maximum size is {limit}."
party.no-party: "<red>You are not in a party."
party.not-leader: "<red>You are not the leader of a party."
party.no-leader-action: "<red>Only the party leader can do that."
party.joined: "<green>{player} joined the party."
party.left: "<yellow>{player} left the party."
party.disbanded: "<yellow>The party was disbanded."
party.invite-sent: "<green>Invited <white>{target}</white>."
party.left-self: "<yellow>You left the party."
party.not-in-party: "<red>You are not in a party."
party.nothing-to-leave: "<gray>Nothing to leave."

leave.any: "<yellow>You left the queue or match."
leave.match: "<yellow>You left the match."
leave.ffa: "<yellow>You left FFA."
leave.nothing: "<gray>Nothing to leave."
leave.unknown: "<red>Unknown command."

ffa.joined: "<green>Joined FFA arena <white>{arena}</white> with kit <white>{kit}</white>."
ffa.left: "<yellow>You left FFA."
ffa.arena-not-ready: "<red>That FFA arena has no FFA spawns or is disabled."
ffa.kit-not-allowed: "<red>That kit is not allowed in this arena."
ffa.no-compatible-kit: "<red>No compatible kit found for that arena."
ffa.vip-arena: "<red>This is a VIP arena."
ffa.event-disabled: "<red>The event queue is not enabled."
ffa.event-missing-config: "<red>Event arena or kit is not configured. Ask an admin to set them."
ffa.event-arena-unavailable: "<red>The configured event arena is not available."
ffa.event-kit-unavailable: "<red>The configured event kit is not available."
ffa.event-kit-invalid: "<red>The event kit is not valid for the selected arena."
ffa.hit-request: "<green><gold>{attacker}</gold> wants to fight you. Hit them back to start."
ffa.hit-request-sent: "<yellow>Fight request sent to <white>{victim}</white>."
ffa.kill-boost-activated: "<green>Your kill boost activated!</green>"

duel.request.player-not-found: "<red>Player not found."
duel.self: "<red>You cannot duel yourself."
duel.request.kit-not-found: "<red>Kit '{kit}' not found."
duel.request.kit-unavailable: "<red>The duel kit is unavailable."
duel.request.no-kits: "<red>No kits are currently available."
duel.request.already-in-match: "<red>Either you or that player is already in a match."
duel.request.arena-unavailable: "<red>No arena is available for that duel kit."
duel.request.sent: "<green>Duel request sent to {target}!"
duel.request.received: "<yellow>{challenger} has challenged you to a duel."
duel.request.instructions: "<gray>Type <white>/duel accept</white> or <white>/duel decline</white> within 30 seconds."
duel.request.no-active: "<red>There is no active duel request to {action}."
duel.request.not-online: "<red>The challenger is no longer online."
duel.request.accepted.challenger: "<green>Your duel request was accepted by {target}!"
duel.request.accepted.target: "<green>You accepted the duel request from {challenger}!"
duel.request.declined.challenger: "<red>Your duel request was declined by {target}."
duel.request.declined.target: "<yellow>You declined the duel request."
duel.start.fight: "<green>Fight!"
duel.win: "<green>Your team won +{elo} Elo.</green>"
duel.loss: "<red>Your team lost -{elo} Elo.</red>"
duel.voucher.used: "<green>Your streak was preserved by a voucher! Remaining: <white>{remaining}</white></green>"
duel.player-eliminated: "<red>You were eliminated."
duel.spectating: "<gray>Stay within the arena or you will be returned to the lobby."
duel.spectator-teleported: "<green>You have been returned to the lobby after leaving the arena."
duel.out-of-bounds: "<red>Out of bounds! You are now spectating.</red>"
duel.result: "<gray>Result: {reason}</gray>"
duel.draw: "<yellow>Match ended: {reason}</yellow>"

admin.reloaded: "<green>Z-FFA reloaded."
admin.global-lobby-set: "<green>Global lobby set."
admin.lobby-items-refreshed: "<green>Lobby items refreshed."

gui.stats-target-unavailable: "<red>Unable to open target stats."
gui.queue-left: "<yellow>You left the queue."
gui.party-not-in-party: "<red>You are not in a party."
gui.party-leader-only-duel: "<red>Only the party leader can queue the party."
gui.party-leader-only-ffa: "<red>Only the party leader can queue the party FFA."
gui.party-left: "<yellow>You left the party."
gui.unknown-action: "<red>Unknown menu action: <white>{action}</white>"
gui.party-members: "<gray>Party: <white>{members}</white>"
