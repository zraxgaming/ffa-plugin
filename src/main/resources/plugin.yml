name: Z-FFA
main: xyz.zcraft.studios.zffa.ZFfaPlugin
version: 1.3.1
api-version: '1.21'
author: ZCraft Studios
website: https://studio.z-craft.xyz
description: Professional FFA and 1v1 duel core. Open source (CC-BY-NC-SA) - Attribution required for forks/modifications. https://github.com/zraxgaming/ffa-plugin
softdepend:
  - PlaceholderAPI
  - Multiverse-Core
  - Vault
  - LuckPerms
  - Essentials
  - PluginMetrics
commands:
  zffa:
    description: Z-FFA admin command.
    usage: /zffa
  ffa:
    description: Player FFA command.
    usage: /ffa
  duel:
    description: Player duel command.
    usage: /duel
  party:
    description: Party command.
    usage: /party
  leave:
    description: Leave your current match, FFA session, or queue.
    usage: /leave
  leavequeue:
    description: Leave your current queue.
    usage: /leavequeue
  leaveparty:
    description: Leave your current party.
    usage: /leaveparty
permissions:
  zf.admin:
    description: Access to Z-FFA admin commands.
    default: op
  zf.player:
    description: Access to Z-FFA player commands.
    default: true
  zf.kit.*:
    description: Access to every Z-FFA kit.
    default: op
  zf.viparena:
    description: Access to VIP FFA arenas.
    default: op
